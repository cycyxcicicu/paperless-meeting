server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls: /api/x → backend:8081/PaperlessMeeting/x
    location /api/ {
        proxy_pass http://backend:8081/PaperlessMeeting/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket: /ws/... → backend:8081/PaperlessMeeting/ws/...
    location /ws {
        rewrite ^/ws(.*)$ /PaperlessMeeting/ws$1 break;
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # React Router - tất cả route trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
