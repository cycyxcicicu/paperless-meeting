version: "3.8"

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API cho Spring Boot kết nối
      - "9001:9001"   # Giao diện web MinIO
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: root1234
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: "no"

volumes:
  minio_data: