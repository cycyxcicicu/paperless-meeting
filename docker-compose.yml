version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paperless_meeting
    volumes:
      - mysql_data:/var/lib/mysql
    # ports removed - internal only (use SSH tunnel for debug)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # ports removed - internal only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    # ports removed - internal only
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: root1234
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  backend:
    build: ./backend
    image: ghcr.io/cycyxcicicu/paperless-meeting/backend:latest
    container_name: backend
    env_file: .env
    environment:
      # Override localhost URLs → Docker service names
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/paperless_meeting?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_URL: http://minio:9000
      SPRING_PROFILES_ACTIVE: prod
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_BACKEND_URL: ${APP_BACKEND_URL:-http://localhost:8081/PaperlessMeeting}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./fontend
    image: ghcr.io/cycyxcicicu/paperless-meeting/frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
